<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7"/>
      <stop offset="50%" style="stop-color:#ec4899"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <linearGradient id="gradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#db2777"/>
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="url(#gradient)" opacity="0.15"/>
  
  <!-- Main circle -->
  <circle cx="50" cy="50" r="45" fill="url(#gradient2)" stroke="white" stroke-width="2"/>
  
  <!-- Letter C -->
  <text x="50" y="68" font-family="Arial, sans-serif" font-size="52" font-weight="bold" text-anchor="middle" fill="white">C</text>
  
  <!-- Gaming controller buttons -->
  <circle cx="30" cy="75" r="3" fill="#4ade80"/>
  <circle cx="70" cy="75" r="3" fill="#ef4444"/>
  <rect x="45" y="75" width="10" height="6" rx="2" fill="#fbbf24"/>
</svg>